# =============================================================
#  Application Configuration
# =============================================================
spring.application.name=chat-backend
server.port=8080

# =============================================================
#  PostgreSQL Database Configuration
#  For production: externalize these via environment variables
#  or Kubernetes Secrets. Never hard-code credentials.
# =============================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/chatdb}
spring.datasource.username=${DB_USERNAME:chatuser}
spring.datasource.password=${DB_PASSWORD:chatpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool settings (important for scalability)
# For high-traffic: increase pool size based on thread count
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =============================================================
#  JPA / Hibernate Configuration
# =============================================================
# "update" auto-creates/alters tables. For production use "validate"
# with Flyway or Liquibase for proper DB migrations.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
# Set to false in production to avoid performance overhead
spring.jpa.show-sql=false

# =============================================================
#  JWT Configuration
#  IMPORTANT: Replace the secret with a strong 256-bit key.
#  Store it in environment variables or a secrets manager
#  (AWS Secrets Manager, Vault, Kubernetes Secrets) — never in code.
# =============================================================
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-change-this-in-production-please}
jwt.expiration.ms=${JWT_EXPIRATION_MS:86400000}

# =============================================================
#  WebSocket Configuration
# =============================================================
# CORS origins for WebSocket connections.
# For production, restrict to your actual domain(s).
websocket.allowed-origins=${WEBSOCKET_ALLOWED_ORIGINS:*}

# =============================================================
#  Logging Configuration (SLF4J + Logback)
#  For production: use JSON format and ship logs to centralized
#  logging (ELK Stack, Datadog, CloudWatch).
# =============================================================
logging.level.com.chatapp=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# =============================================================
#  Scaling Notes:
#  - Redis: Add spring.data.redis.* properties when enabling
#    Redis caching or pub/sub for WebSocket session sharing.
#  - Kafka: Add spring.kafka.bootstrap-servers and consumer/
#    producer configs when integrating Kafka for message fanout.
#  - For stateless scaling: ensure NO server-side WebSocket
#    session state. Use Redis pub/sub for cross-instance delivery.
# =============================================================
